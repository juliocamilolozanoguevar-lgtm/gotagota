<!DOCTYPE html>
<html lang="Es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Panel de Administración</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <!-- TOPBAR (solo visible en móvil) -->
    <div class="topbar">
        <div class="title-business">
            <span>JUANITO SAC</span>
        </div>
        <div class="btn-menu">
            <button class="hamburger" aria-label="Abrir menú">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
    </div>

    <!-- OVERLAY -->
    <div class="overlay"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-logo">Dashboard</div>
        <ul>
            <li>
                <a href="inicio.html"  data-page="home">
                    <i class="fa-solid fa-house"></i>
                    <span>Inicio</span>
                </a>
            </li>
            <li>
                <a href="reportes.html" class="activo" data-page="reportes">
                    <i class="fa-solid fa-clipboard-list"></i>
                    <span>Reportes</span>
                </a>
            </li>
            <li class="nav-logout">
                <a href="#" id="btn-logout">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Cerrar sesión</span>
                </a>
            </li>
        </ul>
    </aside>

    <!-- CONTENIDO PRINCIPAL -->
    <main>
        <nav class="breadcrumb">
            <span>Inicio</span>
            <i class="fa-solid fa-chevron-right"></i>
            <span id="breadcrumb-page">Clientes</span>
        </nav>
        <div class="main-content">

            <div class="d-flex justify-content-between align-items-center mb-4">

                <h2 class="h4 mb-0 fw-bold text-uppercase">Reporte de Cliente</h2>

                <button class="btn btn-primary" 
                        data-bs-toggle="modal"
                        data-bs-target="#modalRegistroCliente">Registrar
                </button>


            </div>
            <div class="table-responsive">
                <table class="table">
                    <thead class="table-dark">
                        <tr>
                            <th scope="col">Id</th>
                            <th scope="col">Nombre</th>
                            <th scope="col">Apellido</th>
                            <th scope="col">DNI</th>
                            <th scope="col">Teléfono</th>
                            <th scope="col">Dirección</th>
                            <th scope="col">Opciones</th>
                            <th>

                            </th>
                        </tr>
                    </thead>
                    <tbody id="table-cliente">

                    </tbody>
                </table>
            </div>
        </div>
    </main>
    </main>

    <!-- 👇 AQUÍ PEGAS TU MODAL -->
    <div class="modal fade" id="exampleModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h1 class="modal-title fs-5">Editar Cliente</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <input type="text" id="myInput" class="form-control" placeholder="Nombre">
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                    <button class="btn btn-primary">Guardar</button>
                </div>

            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
